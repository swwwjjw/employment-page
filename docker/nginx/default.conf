server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 127.0.0.1 localhost;

    root /usr/share/nginx/html;
    index employment-steps.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    location = / {
        try_files /employment-steps.html =404;
    }

    location / {
        try_files $uri $uri/ /employment-steps.html;
    }

    location ~* \.(?:woff2?|ttf|otf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    location ~* \.(?:png|jpe?g|gif|webp|svg|pdf)$ {
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name work-pulkovo.ru www.work-pulkovo.ru;

    return 301 http://127.0.0.1:7000$request_uri;
}
